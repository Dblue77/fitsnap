<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitSnap - Register</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="assets/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg sticky-top bg-primary">
      <div class="container">
        <a class="navbar-brand text-white fw-bold" href="dashboard.html">
          FitSnap
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="dashboard.html">Beranda</a>
          </div>
        </div>
      </div>
    </nav>

    <section class="bg-tiga align-items-center min-vh-100 d-flex">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-4 my-5">
            <div class="card p-4 rounded-4 shadow p-4 border-0 text-center">
              <img
                src="assets/image/logo.png"
                width="120"
                class="mx-auto mb-1"
              />

              <form onsubmit="register(event)">
              <h4 class="text-center">Register Akun Anda</h4>

              <div class="text-start mb-3">
                <label class="fw-bold">Username</label>
                <input type="text" id="nama" class="form-control rounded-3" />
              </div>

              <div class="text-start mb-3">
                <label class="fw-bold">Email</label>
                <input type="email" id="email" class="form-control rounded-3" />
              </div>

              <div class="text-start mb-3">
                <label class="fw-bold">Password</label>
                <input
                  type="password"
                  id="password"
                  class="form-control rounded-3"
                />
              </div>

              <div class="text-center mt-2">
                <button type="submit" class="btn btn-primary w-100">
                  Login
                </button>
              </div>

              <p class="mt-3">
                Sudah Punya Akun? <a href="login.html">Login</a>
              </p>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="text-white bg-dark py-3">
      <div class="container">
        <p class="text-center">&copy; UKK 2026 - FitSnap</p>
        <p class="text-center">SMK Dinamika Pembangunan 2 Jakarta</p>
      </div>
    </footer>

    <script src="js/bootstrap.min.js"></script>
    <script src="assets/js/register.js"></script>
  </body>
</html>
